<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>KLARTeXt. Zeit für dich</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f6f2eb;
  --paper:#fffefb;
  --text:#222;
  --muted:#666;
  --green:#a9bf7a;
  --green-dark:#8aa35c;
  --blue:#c9dff0;
  --shadow:0 10px 40px rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;

  -webkit-tap-highlight-color: transparent;
}

/* HEADER */

nav{
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(14px);
  background:rgba(246,242,235,.8);
  padding:16px 22px;
  border-bottom:1px solid rgba(0,0,0,.05);
}

.nav-inner{
  max-width:900px;
  margin:auto;
  display:flex;
  justify-content:center;
}

.nav-logo{
  height:54px;
}

/* LAYOUT */

.section{
  max-width:900px;
  margin:auto;
  padding:90px 22px;
}

/* ANIMATION SYSTEM */

.fade{
  opacity:0;
  transform:translateY(18px);
  transition:all .9s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* HERO */

.hero h1{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  font-size:clamp(2.2rem,6vw,3.4rem);
  line-height:1.05;
  margin-bottom:18px;
}

.hero p{
  color:#555;
  line-height:1.8;
  max-width:520px;
}

/* QUOTE */

.quote{
  margin-top:40px;
  padding:18px 20px;
  border-left:4px solid var(--green-dark);
  background:rgba(169,191,122,.08);
  border-radius:10px;
  font-style:italic;
  color:#444;
}

/* AUDIO CARD */

.audio-card{
  margin-top:60px;
  background:var(--paper);
  border-radius:24px;
  padding:26px;
  box-shadow:var(--shadow);
}

.audio-title{
  font-weight:600;
  margin-bottom:18px;
}

/* PROGRESS */

.progress{
  height:10px;
  background:rgba(0,0,0,.08);
  border-radius:999px;
  overflow:hidden;
  cursor:pointer;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--green-dark),#7fa0c2);
}

/* TIME */

.time{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:.8rem;
  color:#777;
}

/* CONTROLS */

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:22px;
  margin-top:22px;
}

.btn{
  border:none;
  background:none;
  cursor:pointer;
}

.play{
  width:72px;
  height:72px;
  border-radius:50%;
  background:linear-gradient(145deg,var(--green-dark),#79995a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 22px rgba(0,0,0,.14);
}

/* PDF */

.pdf{
  margin-top:60px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px;
  border-radius:18px;
  background:#f7f5f1;
  text-decoration:none;
  color:inherit;
  border:1px solid rgba(0,0,0,.05);
}

.pdf:hover{
  transform:translateY(-2px);
  transition:.2s;
}

/* FOOTER */

footer{
  text-align:center;
  padding:70px 22px 40px;
  color:#777;
  font-size:.85rem;
}

/* MOBILE */

@media(max-width:600px){

.section{
  padding:70px 16px;
}

.audio-card{
  padding:20px;
}

.controls{
  gap:16px;
}

.play{
  width:64px;
  height:64px;
}

}

audio{display:none;}

</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <img class="nav-logo" src="Klartext-logo.png">
  </div>
</nav>

<!-- HERO -->
<section class="section hero fade">
  <h1>Zeit für<br>Dich</h1>
  <p>
    Manchmal braucht es nur einen ruhigen Moment, um wieder bei sich selbst anzukommen.
  </p>

  <div class="quote fade">
    „Du musstnicht immer stark sein.“
  </div>
</section>

<!-- AUDIO -->
<section class="section fade">

  <div class="audio-card">

    <div class="audio-title">🎧 Geführte Achtsamkeit</div>

    <audio id="audio" src="Zeit-fuer-dich_2026.m4a"></audio>

    <div class="progress" id="progress">
      <div class="progress-fill" id="fill"></div>
    </div>

    <div class="time">
      <span id="t1">0:00</span>
      <span id="t2">–:––</span>
    </div>

    <div class="controls">

      <button class="btn" id="back">↺</button>

      <button class="btn play" id="play">
        ▶
      </button>

      <button class="btn" id="fwd">↻</button>

    </div>

  </div>

</section>

<!-- PDF -->
<section class="section fade">

  <a class="pdf" href="Zeit_fuer_Dich_Achtsamkeitsuebung.pdf" target="_blank">
    📄 Übungsblatt herunterladen
  </a>

</section>

<footer class="fade">
  KLARTeXt — echt. klar. ruhig.
</footer>

<script>

/* ---- Fade In on Scroll ---- */

const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('show');
  });
},{threshold:0.15});

document.querySelectorAll('.fade').forEach(el=>{
  observer.observe(el);
});

/* ---- AUDIO ---- */

const audio = document.getElementById('audio');
const play = document.getElementById('play');
const fill = document.getElementById('fill');
const t1 = document.getElementById('t1');
const t2 = document.getElementById('t2');

function fmt(s){
  if(!isFinite(s)) return '–:––';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

audio.addEventListener('loadedmetadata',()=>{
  t2.textContent = fmt(audio.duration);
});

audio.addEventListener('timeupdate',()=>{
  const pct = audio.currentTime / audio.duration * 100;
  fill.style.width = pct + '%';
  t1.textContent = fmt(audio.currentTime);
});

play.onclick = ()=>{
  if(audio.paused){
    audio.play();
    play.textContent = "❚❚";
  }else{
    audio.pause();
    play.textContent = "▶";
  }
};

document.getElementById('back').onclick = ()=> audio.currentTime -= 15;
document.getElementById('fwd').onclick = ()=> audio.currentTime += 15;

document.getElementById('progress').onclick = (e)=>{
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left)/r.width)*audio.duration;
};

</script>

</body>
</html>
